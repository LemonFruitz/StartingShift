<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Starting Shift — Supervisor</title>
<link rel="manifest" href="manifest.json"/>
<link rel="stylesheet" href="style.css"/>
<style>
.spv-wrap{max-width:600px;margin:0 auto;padding:12px}
.spv-header{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.spv-title{font-size:1rem;font-weight:800}.spv-sub{font-size:.62rem;color:var(--text-muted)}
.spv-profile{display:flex;align-items:center;gap:8px}
.spv-av{width:34px;height:34px;border-radius:8px;background:var(--grad);display:grid;place-items:center;font-size:.65rem;font-weight:800;color:#FFF}
.spv-tabs{display:flex;gap:6px;margin-bottom:10px}
.spv-tab{flex:1;padding:10px;border-radius:var(--radius-sm);background:var(--card);border:1.5px solid var(--border);text-align:center;font-size:.72rem;font-weight:700;color:var(--text-muted);cursor:pointer;transition:all .15s}
.spv-tab.active{border-color:var(--success);color:var(--success);background:rgba(0,200,83,.04)}
.spv-kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.sk{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center}
.sk-val{font-size:1.4rem;font-weight:800;line-height:1}.sk-label{font-size:.58rem;color:var(--text-muted);font-weight:600;margin-top:4px}
.spv-filters{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.sf{flex:1;min-width:80px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.72rem;font-family:var(--font);background:var(--card)}
.spv-list{display:flex;flex-direction:column;gap:6px}
.sr-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;transition:all .15s}
.sr-top{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px}
.sr-name{font-size:.82rem;font-weight:700}.sr-meta{font-size:.58rem;color:var(--text-muted)}
.sr-time{font-size:.62rem;color:var(--text-muted);text-align:right}
.sr-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.sr-badge{padding:3px 8px;border-radius:5px;font-size:.58rem;font-weight:700}
.sb-fit{background:rgba(0,200,83,.08);color:#00C853}.sb-unfit{background:rgba(239,68,68,.08);color:#EF4444}
.sb-pass{background:rgba(16,185,129,.08);color:#10B981}.sb-find{background:rgba(245,158,11,.08);color:#F59E0B}
.sb-rtw{background:rgba(0,200,83,.08);color:#00C853}.sb-bd{background:rgba(239,68,68,.08);color:#EF4444}.sb-uf{background:rgba(245,158,11,.08);color:#F59E0B}
.sb-app{background:rgba(16,185,129,.08);color:#10B981}.sb-rej{background:rgba(239,68,68,.08);color:#EF4444}.sb-pen{background:rgba(100,116,139,.08);color:#64748B}
.sr-hm{font-size:.62rem;color:var(--text-muted);margin-bottom:8px}
.sr-actions{display:flex;gap:6px}
.sr-btn{flex:1;padding:10px;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:.75rem;font-weight:700;cursor:pointer;min-height:40px}
.btn-app{background:#00C853;color:#FFF}.btn-rej{background:#EF4444;color:#FFF}.btn-done{background:var(--input-bg);color:var(--text-muted)}
/* BD card */
.bd-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:6px}
.bd-top{display:flex;justify-content:space-between;align-items:start;margin-bottom:6px}
.bd-uid{font-size:.82rem;font-weight:800}.bd-comp{font-size:.72rem;font-weight:600;margin-top:2px}
.bd-desc{font-size:.65rem;color:var(--text-muted);margin-top:4px}
.bd-tags{display:flex;gap:4px;margin-top:6px}
.empty-box{padding:24px;text-align:center;color:var(--text-muted);font-size:.82rem}
</style>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<style>.mi{font-family:'Material Icons Outlined';font-size:18px;vertical-align:middle;font-weight:normal;font-style:normal;line-height:1}.mi-sm{font-size:14px}</style>
</head>
<body style="background:var(--bg)">
<div class="spv-wrap">
  <!-- Header -->
  <div class="spv-header">
    <div><div class="spv-title">Supervisor</div><div class="spv-sub" id="spvDate">—</div></div>
    <div class="spv-profile"><div><div style="font-size:.72rem;font-weight:700;text-align:right" id="spvName">—</div><div style="font-size:.55rem;color:var(--text-muted);text-align:right" id="spvRole">Supervisor</div></div><div class="spv-av" id="spvAv">—</div></div>
  </div>

  <!-- Tabs -->
  <div class="spv-tabs">
    <div class="spv-tab active" onclick="switchTab('reports',this)"><span class="mi">checklist</span> Laporan</div>
    <div class="spv-tab" onclick="switchTab('bd',this)"><span class="mi">warning_amber</span> BD Report</div>
    <div class="spv-tab" onclick="switchTab('csv',this)"><span class="mi">download</span> CSV</div>
    <div class="spv-tab" onclick="doLogout()"><span class="mi">logout</span></div>
  </div>

  <!-- TAB: REPORTS -->
  <div id="t-reports">
    <div class="spv-kpi">
      <div class="sk"><div class="sk-val" style="color:var(--success)" id="kTotal">—</div><div class="sk-label">Total Laporan</div></div>
      <div class="sk"><div class="sk-val" style="color:#00C853" id="kApp">—</div><div class="sk-label">Approved</div></div>
      <div class="sk"><div class="sk-val" style="color:#F59E0B" id="kPen">—</div><div class="sk-label">Pending</div></div>
      <div class="sk"><div class="sk-val" style="color:#EF4444" id="kRej">—</div><div class="sk-label">Rejected / Unfit</div></div>
    </div>
    <div class="spv-filters">
      <input type="date" class="sf" id="fDate" onchange="loadReports()"/>
      <select class="sf" id="fShift" onchange="loadReports()"><option value="">Semua Shift</option><option value="1">Shift 1</option><option value="2">Shift 2</option></select>
      <select class="sf" id="fStatus" onchange="renderReports()"><option value="">Semua</option><option value="Pending">Pending</option><option value="Approved">Approved</option></select>
    </div>
    <div class="spv-list" id="reportList"></div>
  </div>

  <!-- TAB: BD -->
  <div id="t-bd" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:.88rem;font-weight:700">Breakdown Reports</div><span class="sr-badge sb-rej" id="bdCnt">0</span></div>
    <div id="bdList"></div>
  </div>

  <!-- TAB: CSV -->
  <div id="t-csv" style="display:none;text-align:center;padding:30px">
    <div style="font-size:2rem;margin-bottom:8px"><span class="mi" style="font-size:inherit">download</span></div>
    <div style="font-size:.88rem;font-weight:700;margin-bottom:4px">Download CSV Shift Report</div>
    <div style="font-size:.68rem;color:var(--text-muted);margin-bottom:16px">Data berdasarkan tanggal yang dipilih di filter</div>
    <button onclick="downloadCSV()" style="padding:12px 24px;background:linear-gradient(135deg,#00C853,#00B0FF);color:#FFF;border:none;border-radius:8px;font-family:var(--font);font-weight:700;font-size:.82rem;cursor:pointer;min-height:44px">Download CSV</button>
  </div>
</div>

<script>
const API='https://starting-hte.my.id/api/v1',TOKEN=localStorage.getItem('fms_token'),SESSION=JSON.parse(localStorage.getItem('fms_session')||'null');
if(!SESSION||!TOKEN)window.location.href='index.html';
let allReports=[],bdReports=[];
function $(id){return document.getElementById(id);}
function getRoleLabel(equipmentClass){const cls=(equipmentClass||'').toLowerCase();if(cls.includes('dump truck'))return'Driver';if(cls.includes('light vehicle'))return'Driver';if(cls.includes('manhaul'))return'Driver';if(cls.includes('water truck'))return'Driver';return'Operator';}

function switchTab(t,el){['reports','bd','csv'].forEach(x=>$('t-'+x).style.display='none');$('t-'+t).style.display='';document.querySelectorAll('.spv-tab').forEach(x=>x.classList.remove('active'));if(el)el.classList.add('active');if(t==='bd')loadBD();}

document.addEventListener('DOMContentLoaded',()=>{
  const i=(SESSION.name||'??').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  $('spvAv').textContent=i;$('spvName').textContent=SESSION.name||SESSION.id;$('spvRole').textContent=SESSION.role||'Supervisor';
  $('fDate').value=new Date().toISOString().slice(0,10);
  $('spvDate').textContent=new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  loadReports();
});

async function loadReports(){const date=$('fDate').value||new Date().toISOString().slice(0,10),shift=$('fShift').value;
let url=`${API}/supervisor/shift-reports?date=${date}&limit=500`;if(shift)url+=`&shift=${shift}`;
try{const r=await fetch(url,{headers:{'Authorization':'Bearer '+TOKEN}});const d=await r.json();if(d.success)allReports=d.data.reports||[];renderKPI();renderReports();}catch(e){console.error(e);}}

function renderKPI(){const t=allReports.length,a=allReports.filter(r=>r.validation_status==='Approved').length,rj=allReports.filter(r=>r.validation_status==='Rejected').length,uf=allReports.filter(r=>r.overall_status==='Driver Unfit').length;
$('kTotal').textContent=t;$('kApp').textContent=a;$('kPen').textContent=t-a-rj;$('kRej').textContent=rj+uf;}

function renderReports(){const sf=$('fStatus').value;let list=allReports;if(sf)list=list.filter(r=>(r.validation_status||'Pending')===sf);
if(!list.length){$('reportList').innerHTML='<div class="empty-box">Tidak ada laporan.</div>';return;}
$('reportList').innerHTML=list.map(r=>{const tm=r.timestamp_filled?new Date(r.timestamp_filled).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}):'—';
const vs=r.validation_status||'Pending';const isPen=vs==='Pending'&&r.overall_status!=='Driver Unfit';
const stC=r.overall_status==='Ready to Work'?'sb-rtw':r.overall_status==='Driver Unfit'?'sb-uf':'sb-bd';
const stL=r.overall_status==='Ready to Work'?'RTW':r.overall_status==='Driver Unfit'?'Unfit':'BD';
const vsC=vs==='Approved'?'sb-app':vs==='Rejected'?'sb-rej':'sb-pen';
return`<div class="sr-card"><div class="sr-top"><div><div class="sr-name">${r.driver_name||r.driver_id}</div><div class="sr-meta">${r.driver_id} · ${r.unit_id} · ${r.equipment_class||''} · ${getRoleLabel(r.equipment_class)}</div></div><div class="sr-time">${tm}</div></div>
<div class="sr-badges"><span class="sr-badge ${r.fit_status==='Fit'?'sb-fit':'sb-unfit'}">${r.fit_status}</span><span class="sr-badge ${r.p2h_status==='Passed'?'sb-pass':'sb-find'}">${r.p2h_status||'—'}</span><span class="sr-badge ${stC}">${stL}</span><span class="sr-badge ${vsC}">${vs}</span></div>
${r.odometer_entered?`<div class="sr-hm">HM: ${r.odometer_entered}${r.odometer_end?' → '+r.odometer_end+' (+'+( r.odometer_end-r.odometer_entered)+')':' (akhir belum diisi)'}</div>`:''}
${isPen?`<div class="sr-actions"><button class="sr-btn btn-app" onclick="validate('${r.report_id}','Approved')"><span class="mi">check</span> Approve</button><button class="sr-btn btn-rej" onclick="validate('${r.report_id}','Rejected')"><span class="mi">close</span> Reject</button></div>`:`<div class="sr-actions"><button class="sr-btn btn-done" disabled>${vs==='Approved'?'<span class="mi">check_circle</span> Approved':vs==='Rejected'?'<span class="mi">cancel</span> Rejected':'<span class="mi">warning_amber</span> '+stL}</button></div>`}</div>`;}).join('');}

async function validate(rid,status){try{const r=await fetch(`${API}/supervisor/shift-reports/${rid}/validate`,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},body:JSON.stringify({validation_status:status,validated_by:SESSION.id})});const d=await r.json();
if(d.success){const rp=allReports.find(x=>x.report_id===rid);if(rp)rp.validation_status=status;renderKPI();renderReports();}}catch{alert('Gagal.');}}

async function loadBD(){try{const r=await fetch(`${API}/bd-reports?limit=30`,{headers:{'Authorization':'Bearer '+TOKEN}});const d=await r.json();if(d.success)bdReports=d.data.reports||d.data||[];renderBD();}catch{}}
function renderBD(){const open=(Array.isArray(bdReports)?bdReports:[]).filter(r=>r.status!=='Resolved');$('bdCnt').textContent=open.length+' aktif';
if(!open.length){$('bdList').innerHTML='<div class="empty-box"><span class="mi">check_circle</span> Semua resolved</div>';return;}
$('bdList').innerHTML=open.map(r=>{const sl=r.severity==='Critical'?'Kritis':r.severity==='Major'?'Sedang':'Rendah';
const sc=r.severity==='Critical'?'sb-rej':r.severity==='Major'?'sb-find':'sb-pen';
const ss=r.status==='Open'?'sb-rej':'sb-find';
return`<div class="bd-card"><div class="bd-top"><div><div class="bd-uid" style="color:${r.severity==='Critical'?'var(--danger,#EF4444)':'var(--warning,#F59E0B)'}">${r.unit_id}</div><div class="bd-comp">${r.component||''}</div></div><div class="bd-tags"><span class="sr-badge ${sc}">${sl}</span><span class="sr-badge ${ss}">${r.status}</span></div></div><div class="bd-desc">${r.description||''} — Dilaporkan ${r.driver_name||r.driver_id||''}</div></div>`;}).join('');}

function downloadCSV(){const today=$('fDate').value||new Date().toISOString().slice(0,10);const B='\uFEFF';let csv='Driver ID,Nama,Unit,Tipe,FTW,P2H,Status,HM Awal,HM Akhir,Waktu,Validasi\n';
allReports.forEach(r=>{csv+=`${r.driver_id},"${r.driver_name||''}",${r.unit_id},"${r.equipment_class||''}",${r.fit_status},${r.p2h_status||''},"${r.overall_status}",${r.odometer_entered||''},${r.odometer_end||''},"${r.timestamp_filled?new Date(r.timestamp_filled).toLocaleString('id-ID'):''}",${r.validation_status||'Pending'}\n`;});
const b=new Blob([B+csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`Shift_Report_${today}.csv`;document.body.appendChild(a);a.click();a.remove();}
function doLogout(){localStorage.removeItem('fms_token');localStorage.removeItem('fms_session');window.location.href='index.html';}
</script>
<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}</script>
</body>
</html>
