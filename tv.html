<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#F0F4F8"/>
<link rel="manifest" href="manifest.json"/>
<title>Starting Shift — TV Monitor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
:root{--bg:#F0F4F8;--card:#FFF;--border:#E2E8F0;--text:#1E293B;--muted:#94A3B8;--gray:#64748B;--green:#00C853;--blue:#00B0FF;--red:#EF4444;--amber:#F59E0B;--shadow:0 1px 3px rgba(0,0,0,.06);--font:'Plus Jakarta Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:var(--font);color:var(--text)}

.tv{display:grid;grid-template-rows:auto auto 1fr;height:100vh;padding:14px 18px;gap:10px}

.topbar{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 18px;box-shadow:var(--shadow)}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-left img{height:28px}
.tb-title{font-size:1rem;font-weight:800;color:var(--text)}
.tb-sub{font-size:.58rem;color:var(--muted);font-weight:500}
.tb-right{display:flex;align-items:center;gap:14px}
.tb-shift{padding:5px 12px;border-radius:20px;font-size:.68rem;font-weight:700}
.tb-shift.s1{background:rgba(0,200,83,.1);color:var(--green);border:1px solid rgba(0,200,83,.2)}
.tb-shift.s2{background:rgba(0,176,255,.1);color:var(--blue);border:1px solid rgba(0,176,255,.2)}
.tb-clock{font-size:1.3rem;font-weight:900;font-variant-numeric:tabular-nums;color:var(--text)}
.tb-date{font-size:.6rem;color:var(--muted);text-align:right}
.tb-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2.5s ease infinite}

.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 10px;text-align:center;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 10px 10px}
.kpi.g::after{background:var(--green)}.kpi.r::after{background:var(--red)}.kpi.y::after{background:var(--amber)}.kpi.b::after{background:var(--blue)}
.kpi-val{font-size:1.8rem;font-weight:900;line-height:1}
.kpi-label{font-size:.55rem;font-weight:600;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}

.main{display:grid;grid-template-columns:1fr 300px;gap:10px;min-height:0;overflow:hidden}

/* Unit panel */
.unit-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;overflow-y:auto;box-shadow:var(--shadow)}
.unit-panel::-webkit-scrollbar{width:4px}.unit-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.cat-header{font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:10px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cat-header:first-child{margin-top:0}
.cat-stats{font-weight:600;font-size:.58rem}
.cat-stats .cs-g{color:var(--green)}.cat-stats .cs-r{color:var(--red)}.cat-stats .cs-y{color:var(--amber)}
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:5px;margin-bottom:6px}
.ug{border-radius:8px;padding:7px 5px;text-align:center;border:1px solid var(--border);transition:all .3s;background:var(--card)}
.ug.ready{background:rgba(0,200,83,.04);border-color:rgba(0,200,83,.2)}
.ug.bd{background:rgba(239,68,68,.05);border-color:rgba(239,68,68,.2);animation:bdPulse 3s ease infinite}
.ug.mt{background:rgba(245,158,11,.05);border-color:rgba(245,158,11,.2)}
.ug-id{font-size:.65rem;font-weight:800}
.ug.ready .ug-id{color:var(--green)}.ug.bd .ug-id{color:var(--red)}.ug.mt .ug-id{color:var(--amber)}
.ug-status{font-size:.45rem;font-weight:600;color:var(--muted);margin-top:1px}
.ug-driver{font-size:.42rem;color:var(--gray);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Right panel */
.right-panel{display:flex;flex-direction:column;gap:8px;min-height:0;overflow:hidden}
.info-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;flex:1;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.panel-title{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;justify-content:space-between}
.info-list{overflow-y:auto;flex:1}
.info-list::-webkit-scrollbar{width:3px}.info-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.driver-item{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-bottom:1px solid var(--border)}
.di-name{font-size:.7rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.di-meta{font-size:.5rem;color:var(--muted)}
.di-badge{font-size:.48rem;font-weight:700;padding:3px 8px;border-radius:10px}
.di-badge.rtw{background:rgba(0,200,83,.08);color:var(--green)}

.bd-item{padding:8px 10px;border-left:3px solid var(--red);background:rgba(239,68,68,.04);border-radius:0 8px 8px 0;margin-bottom:5px}
.bd-unit{font-size:.72rem;font-weight:800;color:var(--red)}
.bd-notes{font-size:.58rem;color:var(--gray);margin-top:2px;line-height:1.4}

.empty-msg{text-align:center;padding:16px;color:var(--muted);font-size:.72rem}

/* Notif */
.notif-bar{position:fixed;top:0;left:0;right:0;z-index:999;display:flex;align-items:center;gap:12px;padding:12px 20px;background:linear-gradient(135deg,#d32f2f,#c62828);color:white;font-size:.88rem;font-weight:700;transform:translateY(-100%);opacity:0;transition:all .4s ease;cursor:pointer;box-shadow:0 4px 20px rgba(211,47,47,.4)}
.notif-bar.show{transform:translateY(0);opacity:1}
.notif-icon{font-size:1.2rem;animation:bdPulse 1s ease infinite}
.notif-text{flex:1}.notif-close{opacity:.6}

@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,200,83,.25)}50%{box-shadow:0 0 0 5px rgba(0,200,83,0)}}
@keyframes bdPulse{0%,100%{opacity:1}50%{opacity:.65}}
</style>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<style>.mi{font-family:'Material Icons Outlined';font-size:18px;vertical-align:middle;font-weight:normal;font-style:normal;line-height:1}.mi-sm{font-size:14px}</style>
</head>
<body>

<div class="notif-bar" id="notifBar">
  <span class="notif-icon"><span class="mi">emergency</span></span><span class="notif-text"></span><span class="notif-close"><span class="mi">close</span></span>
</div>

<div class="tv">
<div class="topbar">
  <div class="tb-left">
    <img src="logo-hte.png" alt="HTE"/>
    <div><div class="tb-title">Starting Shift — Live Monitor</div><div class="tb-sub">PT Halmahera Transportasi Energi · Site HSM · Pit Cendana Extend</div></div>
  </div>
  <div class="tb-right">
    <div class="tb-dot"></div>
    <div id="shiftBadge" class="tb-shift s1">SHIFT 1</div>
    <div style="text-align:right"><div class="tb-clock" id="clock">--:--:--</div><div class="tb-date" id="dateDisp">—</div></div>
  </div>
</div>

<div class="kpi-row">
  <div class="kpi g"><div class="kpi-val" style="color:var(--green)" id="kReady">—</div><div class="kpi-label">Unit Ready</div></div>
  <div class="kpi r"><div class="kpi-val" style="color:var(--red)" id="kBD">—</div><div class="kpi-label">Breakdown</div></div>
  <div class="kpi y"><div class="kpi-val" style="color:var(--amber)" id="kMT">—</div><div class="kpi-label">Maintenance</div></div>
  <div class="kpi b"><div class="kpi-val" style="color:var(--blue)" id="kDrivers">—</div><div class="kpi-label">Driver Aktif</div></div>
  <div class="kpi g"><div class="kpi-val" style="color:var(--green)" id="kReports">—</div><div class="kpi-label">Laporan</div></div>
  <div class="kpi r"><div class="kpi-val" style="color:var(--red)" id="kBDOpen">—</div><div class="kpi-label">BD Open</div></div>
</div>

<div class="main">
  <div class="unit-panel" id="unitPanel"></div>
  <div class="right-panel">
    <div class="info-panel" style="flex:1.2">
      <div class="panel-title"><span><span class="mi">person</span> Driver Aktif</span><span id="driverCount">—</span></div>
      <div class="info-list" id="driverList"><div class="empty-msg">Memuat...</div></div>
    </div>
    <div class="info-panel">
      <div class="panel-title"><span style="color:var(--red)"><span class="mi">error</span> Unit BD / MT</span><span id="bdCount">—</span></div>
      <div class="info-list" id="bdList"><div class="empty-msg">Memuat...</div></div>
    </div>
  </div>
</div>
</div>

<script>
const API='https://starting-hte.my.id/api/v1';
const TOKEN=localStorage.getItem('fms_token');
if(!TOKEN){const p=new URLSearchParams(location.search);if(p.get('token'))localStorage.setItem('fms_token',p.get('token'));else{alert('Login dulu sebagai CCR.');window.location.href='index.html';}}
const AUTH={'Authorization':'Bearer '+(localStorage.getItem('fms_token'))};

let allUnits=[],driverMap={},prevBDUnits=new Set(),prevBDOpen=0,firstLoad=true;
function getRoleLabel(equipmentClass){const cls=(equipmentClass||'').toLowerCase();if(cls.includes('articulate'))return'Operator';if(cls.includes('dump truck'))return'Driver';if(cls.includes('light vehicle'))return'Driver';if(cls.includes('manhaul'))return'Driver';if(cls.includes('water truck'))return'Driver';return'Operator';}

function playAlert(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[0,0.25,0.5].forEach(t=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;o.type='square';g.gain.setValueAtTime(0.15,ctx.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.2);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.2);});}catch{}}
function showNotif(msg){const el=document.getElementById('notifBar');el.querySelector('.notif-text').textContent=msg;el.classList.add('show');playAlert();setTimeout(()=>el.classList.remove('show'),12000);}

function updateClock(){const now=new Date();document.getElementById('clock').textContent=now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});document.getElementById('dateDisp').textContent=now.toLocaleDateString('id-ID',{weekday:'long',day:'2-digit',month:'short',year:'numeric'});const h=now.getHours(),s1=h>=7&&h<19;const b=document.getElementById('shiftBadge');b.textContent=s1?'SHIFT 1 (07-19)':'SHIFT 2 (19-07)';b.className='tb-shift '+(s1?'s1':'s2');}
setInterval(updateClock,1000);updateClock();

async function loadAll(){
  try{
    const [uR,dR,sR]=await Promise.all([
      fetch(`${API}/vehicles`,{headers:AUTH}),
      fetch(`${API}/vehicles/active-drivers`,{headers:AUTH}),
      fetch(`${API}/supervisor/dashboard-stats`,{headers:AUTH}),
    ]);
    const uD=await uR.json(),dD=await dR.json(),sD=await sR.json();
    if(uD.success)allUnits=uD.data;
    if(dD.success){
      driverMap={};
      // Filter drivers by current shift
      const h=new Date().getHours();
      const isS1=h>=7&&h<19;
      dD.data.filter(x=>{
        if(!x.timestamp_filled)return true;
        const dh=new Date(x.timestamp_filled).getHours();
        return isS1?(dh>=7&&dh<19):(dh>=19||dh<7);
      }).forEach(x=>{driverMap[x.unit_id]=x;});
    }
    renderKPI(sD.success?sD.data:null);
    renderUnits();
    renderDrivers(dD.success?dD.data:[]);
    renderBD();
    // Detect new BD
    if(!firstLoad){
      const cur=new Set(allUnits.filter(u=>u.status_unit==='Breakdown').map(u=>u.unit_id));
      const nb=[...cur].filter(id=>!prevBDUnits.has(id));
      if(nb.length>0)showNotif(`BREAKDOWN BARU: ${nb.join(', ')}`);
      if(sD.success&&sD.data.bd_open>prevBDOpen&&prevBDOpen>0)showNotif(`BD Report baru masuk! Total: ${sD.data.bd_open}`);
      prevBDUnits=cur;if(sD.success)prevBDOpen=sD.data.bd_open;
    }else{prevBDUnits=new Set(allUnits.filter(u=>u.status_unit==='Breakdown').map(u=>u.unit_id));if(sD.success)prevBDOpen=sD.data.bd_open;firstLoad=false;}
  }catch(e){console.error(e);}
}

function renderKPI(s){
  const r=allUnits.filter(u=>u.status_unit==='Ready').length;
  const bd=allUnits.filter(u=>u.status_unit==='Breakdown').length;
  const mt=allUnits.filter(u=>u.status_unit==='Maintenance').length;
  document.getElementById('kReady').textContent=r;
  document.getElementById('kBD').textContent=bd;
  document.getElementById('kMT').textContent=mt;
  document.getElementById('kDrivers').textContent=s?s.active_drivers:'—';
  document.getElementById('kReports').textContent=s?s.total_reports:'—';
  document.getElementById('kBDOpen').textContent=s?s.bd_open:'—';
}

function renderUnits(){
  const panel=document.getElementById('unitPanel');
  // Group by equipment_class
  const classes=[...new Set(allUnits.map(u=>u.equipment_class||'Other'))].sort();
  let html='';
  classes.forEach(cls=>{
    const units=allUnits.filter(u=>(u.equipment_class||'Other')===cls);
    // Sort: BD first, MT, Ready
    units.sort((a,b)=>{const o={'Breakdown':0,'Maintenance':1,'Ready':2};return(o[a.status_unit]||2)-(o[b.status_unit]||2);});
    const rdy=units.filter(u=>u.status_unit==='Ready').length;
    const bd=units.filter(u=>u.status_unit==='Breakdown').length;
    const mt=units.filter(u=>u.status_unit==='Maintenance').length;

    html+=`<div class="cat-header"><span>${cls} (${units.length})</span><span class="cat-stats"><span class="cs-g">${rdy}R</span> · <span class="cs-r">${bd}B</span> · <span class="cs-y">${mt}M</span></span></div>`;
    html+=`<div class="unit-grid">`;
    units.forEach(u=>{
      const st=u.status_unit==='Ready'?'ready':u.status_unit==='Breakdown'?'bd':'mt';
      const stL=u.status_unit==='Ready'?'READY':u.status_unit==='Breakdown'?'BD':'MT';
      const drv=driverMap[u.unit_id];
      html+=`<div class="ug ${st}"><div class="ug-id">${u.unit_id}</div><div class="ug-status">${stL}</div>${drv?`<div class="ug-driver">${drv.driver_name||''}</div>`:''}</div>`;
    });
    html+=`</div>`;
  });
  panel.innerHTML=html;
}

function renderDrivers(drivers){
  const list=document.getElementById('driverList');
  document.getElementById('driverCount').textContent=drivers.length;
  if(!drivers.length){list.innerHTML='<div class="empty-msg">Belum ada driver lapor.</div>';return;}
  list.innerHTML=drivers.map(d=>{
    const t=d.timestamp_filled?new Date(d.timestamp_filled).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}):'';
    const role=getRoleLabel(d.equipment_class||(allUnits.find(u=>u.unit_id===d.unit_id)||{}).equipment_class);
    return`<div class="driver-item"><div style="min-width:0;flex:1"><div class="di-name">${d.driver_name||d.driver_id}</div><div class="di-meta">${d.driver_id} · ${d.unit_id} · ${role} · ${t}</div></div><div class="di-badge rtw">RTW</div></div>`;
  }).join('');
}

function renderBD(){
  const bdU=allUnits.filter(u=>u.status_unit!=='Ready');
  const list=document.getElementById('bdList');
  document.getElementById('bdCount').textContent=bdU.length;
  if(!bdU.length){list.innerHTML='<div class="empty-msg" style="color:var(--green)"><span class="mi">check_circle</span> Semua unit Ready</div>';return;}
  list.innerHTML=bdU.map(u=>{
    const c=u.status_unit==='Breakdown'?'var(--red)':'var(--amber)';
    return`<div class="bd-item" style="border-left-color:${c}"><div class="bd-unit" style="color:${c}">${u.unit_id} — ${u.status_unit}</div><div class="bd-notes">${u.notes||'Tidak ada keterangan'}</div></div>`;
  }).join('');
}

loadAll();
let refreshTimer=setInterval(loadAll,15000);
document.addEventListener('visibilitychange',()=>{if(document.hidden)clearInterval(refreshTimer);else{loadAll();refreshTimer=setInterval(loadAll,15000);}});
document.addEventListener('dblclick',()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();});
document.getElementById('notifBar').addEventListener('click',function(){this.classList.remove('show');});
</script>
</body>
</html>
